<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>16:9 Image Cropper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 1rem;
            opacity: 0.9;
        }

        .content {
            padding: 20px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 12px;
            padding: 25px 20px;
            text-align: center;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05), rgba(118, 75, 162, 0.05));
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            transform: translateY(-2px);
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15), rgba(118, 75, 162, 0.15));
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 15px;
        }

        .upload-text {
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .upload-subtext {
            color: #666;
            font-size: 0.9rem;
        }

        #fileInput {
            display: none;
        }

        .image-container {
            display: none;
            margin-top: 20px;
        }

        .image-preview {
            text-align: center;
            margin-bottom: 20px;
        }

        .original-image, .cropped-image {
            max-width: 100%;
            max-height: 400px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin: 10px;
        }

        .image-section {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 10px;
            margin: 12px 0;
        }

        .image-section h3 {
            color: #333;
            margin-bottom: 8px;
            font-size: 1rem;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .btn {
            padding: 6px 16px;
            border: none;
            border-radius: 16px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #333;
            border: 2px solid #dee2e6;
        }

        .btn-secondary:hover {
            background: #e9ecef;
            transform: translateY(-2px);
        }

        .processing {
            text-align: center;
            padding: 40px;
            color: #667eea;
            font-size: 1.2rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .image-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 15px;
        }

        @media (max-width: 768px) {
            .image-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📐 16:9 Image Cropper</h1>
            <p>Justin's 16:9 image crop tool</p>
        </div>
        
        <div class="content">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <div class="upload-text">Drop your image here or click to browse</div>
                <div class="upload-subtext">Supports JPG, PNG, GIF, and WebP formats</div>
                <input type="file" id="fileInput" accept="image/*" multiple>
            </div>
            
            <div id="processing" class="processing" style="display: none;">
                <div class="spinner"></div>
                Processing images...
            </div>
            
            <div id="imageContainer" class="image-container">
                <div class="controls" style="margin-bottom: 15px;">
                    <button class="btn btn-secondary" onclick="clearImages()">Clear All</button>
                    <button class="btn btn-primary" onclick="downloadAll()">Download All</button>
                </div>
                <div id="imagesGrid"></div>
            </div>
        </div>
    </div>

    <script>
        let processedImages = [];

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const imageContainer = document.getElementById('imageContainer');
        const imagesGrid = document.getElementById('imagesGrid');
        const processing = document.getElementById('processing');

        // Upload area interactions
        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', handleDragOver);
        uploadArea.addEventListener('dragleave', handleDragLeave);
        uploadArea.addEventListener('drop', handleDrop);
        fileInput.addEventListener('change', handleFileSelect);

        function handleDragOver(e) {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        }

        function handleDragLeave(e) {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
        }

        function handleDrop(e) {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = Array.from(e.dataTransfer.files).filter(file => file.type.startsWith('image/'));
            if (files.length > 0) {
                processFiles(files);
            }
        }

        function handleFileSelect(e) {
            const files = Array.from(e.target.files);
            if (files.length > 0) {
                processFiles(files);
            }
        }

        function processFiles(files) {
            processing.style.display = 'block';
            imageContainer.style.display = 'none';
            
            const promises = files.map(file => processImage(file));
            
            Promise.all(promises).then(() => {
                processing.style.display = 'none';
                imageContainer.style.display = 'block';
                displayImages();
            });
        }

        function processImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const croppedVersions = {
                            top: cropTo16x9(img, 'top'),
                            middle: cropTo16x9(img, 'middle'),
                            bottom: cropTo16x9(img, 'bottom')
                        };
                        const blurVersion = createBlurBackground(img, 50, 50, 50); // Default 50% for all settings
                        
                        processedImages.push({
                            original: e.target.result,
                            cropped: croppedVersions,
                            blur: blurVersion,
                            originalImage: img, // Store original image for regenerating blur versions
                            filename: file.name,
                            currentAlignment: 'middle',
                            currentMethod: 'crop',
                            backgroundContrast: 50,
                            backgroundSaturation: 50,
                            backgroundBrightness: 50
                        });
                        resolve();
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function createBlurBackground(img, contrast = 50, saturation = 50, brightness = 50, alignment = 'middle', customPosition = 50, zoom = 100) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // Set canvas to 16:9 ratio
            const targetRatio = 16 / 9;
            canvas.width = 1920;
            canvas.height = 1080;
            
            // Calculate background image dimensions to fill canvas while maintaining aspect ratio (crop, don't stretch)
            // Add extra padding to account for blur edge effects
            const blurPadding = 160; // 2x blur radius for safety
            const imageRatio = img.width / img.height;
            let bgWidth, bgHeight, bgX, bgY;
            
            if (imageRatio > targetRatio) {
                // Image is wider than target - fit to height and crop sides
                bgHeight = canvas.height + (blurPadding * 2);
                bgWidth = bgHeight * imageRatio;
                bgX = (canvas.width - bgWidth) / 2;
                bgY = -blurPadding;
            } else {
                // Image is taller than target - fit to width and crop top/bottom
                bgWidth = canvas.width + (blurPadding * 2);
                bgHeight = bgWidth / imageRatio;
                bgX = -blurPadding;
                bgY = (canvas.height - bgHeight) / 2;
            }
            
            // Calculate filter values based on separate controls
            const contrastValue = 50 + (contrast * 0.5); // Range: 50% to 100%
            const saturationValue = saturation; // Direct range: 0% to 100%
            const brightnessValue = 50 + (brightness * 0.5); // Range: 50% to 100%
            
            // Draw blurred background with separate contrast, saturation, and brightness adjustments
            ctx.filter = `blur(80px) contrast(${contrastValue}%) saturate(${saturationValue}%) brightness(${brightnessValue}%)`;
            ctx.drawImage(img, bgX, bgY, bgWidth, bgHeight);
            
            // Reset filter for sharp overlay
            ctx.filter = 'none';
            
            // Calculate base overlay dimensions (before zoom)
            let baseOverlayWidth, baseOverlayHeight;
            
            if (imageRatio > targetRatio) {
                // Image is wider - fit to canvas width
                baseOverlayWidth = canvas.width;
                baseOverlayHeight = canvas.width / imageRatio;
            } else {
                // Image is taller - fit to canvas height
                baseOverlayHeight = canvas.height;
                baseOverlayWidth = canvas.height * imageRatio;
            }
            
            // Apply zoom factor (25% to 150%)
            const zoomFactor = zoom / 100;
            const overlayWidth = baseOverlayWidth * zoomFactor;
            const overlayHeight = baseOverlayHeight * zoomFactor;
            
            // Calculate position with zoom applied
            let overlayX, overlayY;
            
            if (imageRatio > targetRatio) {
                // Image is wider - center horizontally, apply vertical alignment
                overlayX = (canvas.width - overlayWidth) / 2;
                
                // Apply vertical alignment for wide images
                switch (alignment) {
                    case 'top':
                        overlayY = 0;
                        break;
                    case 'bottom':
                        overlayY = canvas.height - overlayHeight;
                        break;
                    case 'custom':
                        const maxYOffset = canvas.height - overlayHeight;
                        overlayY = maxYOffset * (customPosition / 100);
                        break;
                    case 'middle':
                    default:
                        overlayY = (canvas.height - overlayHeight) / 2;
                        break;
                }
            } else {
                // Image is taller - apply vertical alignment here too!
                overlayX = (canvas.width - overlayWidth) / 2;
                
                // Apply vertical alignment for tall images as well
                switch (alignment) {
                    case 'top':
                        overlayY = 0;
                        break;
                    case 'bottom':
                        overlayY = canvas.height - overlayHeight;
                        break;
                    case 'custom':
                        const maxYOffset = canvas.height - overlayHeight;
                        overlayY = maxYOffset * (customPosition / 100);
                        break;
                    case 'middle':
                    default:
                        overlayY = (canvas.height - overlayHeight) / 2;
                        break;
                }
            }
            
            // Add soft drop shadow to the foreground image
            ctx.shadowColor = 'rgba(0, 0, 0, 0.25)';
            ctx.shadowBlur = 40;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 8;
            
            // Draw the sharp original image on top with shadow and zoom
            ctx.drawImage(img, overlayX, overlayY, overlayWidth, overlayHeight);
            
            // Reset shadow for any future drawing
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
            
            return canvas.toDataURL('image/png', 0.9);
        }

        function cropTo16x9(img, alignment = 'middle') {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            const targetRatio = 16 / 9;
            const sourceRatio = img.width / img.height;
            
            let sourceX = 0, sourceY = 0, sourceWidth = img.width, sourceHeight = img.height;
            
            if (sourceRatio > targetRatio) {
                // Image is wider than 16:9, crop the width (horizontal alignment doesn't change)
                sourceWidth = img.height * targetRatio;
                sourceX = (img.width - sourceWidth) / 2;
            } else {
                // Image is taller than 16:9, crop the height based on alignment
                sourceHeight = img.width / targetRatio;
                
                switch (alignment) {
                    case 'top':
                        sourceY = 0;
                        break;
                    case 'bottom':
                        sourceY = img.height - sourceHeight;
                        break;
                    case 'middle':
                    default:
                        sourceY = (img.height - sourceHeight) / 2;
                        break;
                }
            }
            
            // Set canvas size to maintain good quality
            const maxWidth = 1920;
            const maxHeight = 1080;
            
            if (sourceWidth > maxWidth) {
                canvas.width = maxWidth;
                canvas.height = maxWidth / targetRatio;
            } else {
                canvas.width = sourceWidth;
                canvas.height = sourceHeight;
            }
            
            ctx.drawImage(
                img,
                sourceX, sourceY, sourceWidth, sourceHeight,
                0, 0, canvas.width, canvas.height
            );
            
            return canvas.toDataURL('image/png', 0.9);
        }

        function displayImages() {
            imagesGrid.innerHTML = '';
            
            processedImages.forEach((imageData, index) => {
                const imageSection = document.createElement('div');
                imageSection.className = 'image-section';
                
                imageSection.innerHTML = `
                    <h3>Image ${index + 1}: ${imageData.filename}</h3>
                    <div class="image-grid">
                        <div>
                            <h4 style="text-align: center; margin-bottom: 10px; color: #666;">Original</h4>
                            <img src="${imageData.original}" alt="Original" class="original-image">
                        </div>
                        <div>
                            <h4 style="text-align: center; margin-bottom: 10px; color: #667eea;">16:9 Cropped</h4>
                            <div style="position: relative; display: inline-block;">
                                <img src="${imageData.cropped.middle}" alt="Cropped" class="cropped-image">
                                <div id="cropPreview${index}" style="display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none;">
                                    <canvas id="previewCanvas${index}" style="width: 100%; height: 100%; object-fit: contain;"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div style="text-align: center; margin-top: 15px;">
                        <div style="margin-bottom: 15px;">
                            <label style="color: #333; font-weight: 600; margin-right: 15px;">Crop Method:</label>
                                                            <select onchange="updateCropMethod(${index}, this.value)" style="padding: 4px 8px; border-radius: 4px; border: 2px solid #dee2e6; font-size: 0.85rem; margin-right: 10px;">
                                <option value="crop">Crop to Fit</option>
                                <option value="blur">Blur Background</option>
                            </select>
                            <span id="alignmentControl${index}">
                                <label style="color: #333; font-weight: 600; margin-right: 15px;">Vertical Alignment:</label>
                                <select onchange="updateCropAlignment(${index}, this.value)" style="padding: 4px 8px; border-radius: 4px; border: 2px solid #dee2e6; font-size: 0.85rem;">
                                    <option value="top">Top</option>
                                    <option value="middle" selected>Middle</option>
                                    <option value="bottom">Bottom</option>
                                    <option value="custom">Custom</option>
                                </select>
                            </span>
                        </div>
                        <div id="customAlignmentControl${index}" style="margin-bottom: 15px; display: none;">
                            <div style="margin-bottom: 10px;">
                                <label style="color: #333; font-weight: 600; margin-right: 15px;">Vertical Position:</label>
                                <input type="range" id="verticalSlider${index}" min="0" max="100" value="50" 
                                       oninput="updateCustomAlignmentPreview(${index}, this.value)"
                                       onchange="updateCustomAlignment(${index}, this.value)"
                                       style="width: 200px; margin-right: 10px;">
                                <span id="verticalValue${index}" style="color: #666; font-size: 0.9rem;">50%</span>
                            </div>
                            <div style="font-size: 0.85rem; color: #888; font-style: italic;">
                                0% = top of image, 50% = center, 100% = bottom of image
                            </div>
                        </div>
                        <div id="blurControls${index}" style="margin-bottom: 15px; display: none;">
                            <div style="margin-bottom: 10px;">
                                <label style="color: #333; font-weight: 600; margin-right: 15px;">Foreground Position:</label>
                                <select id="blurAlignmentSelect${index}" onchange="updateBlurAlignment(${index}, this.value)" style="padding: 4px 8px; border-radius: 4px; border: 2px solid #dee2e6; font-size: 0.85rem; margin-right: 10px;">
                                    <option value="top">Top</option>
                                    <option value="middle" selected>Middle</option>
                                    <option value="bottom">Bottom</option>
                                    <option value="custom">Custom</option>
                                </select>
                            </div>
                            <div id="blurCustomPosition${index}" style="margin-bottom: 15px; display: none;">
                                <label style="color: #333; font-weight: 600; margin-right: 15px;">Vertical Position:</label>
                                <input type="range" id="blurVerticalSlider${index}" min="0" max="100" value="50" 
                                       oninput="updateBlurCustomPosition(${index}, this.value)"
                                       onchange="updateBlurCustomPosition(${index}, this.value)"
                                       style="width: 200px; margin-right: 10px;">
                                <span id="blurVerticalValue${index}" style="color: #666; font-size: 0.9rem;">50%</span>
                            </div>
                            <div style="margin-bottom: 15px;">
                                <label style="color: #333; font-weight: 600; margin-right: 15px;">Foreground Zoom:</label>
                                <input type="range" id="blurZoomSlider${index}" min="25" max="150" value="100" 
                                       oninput="updateBlurZoom(${index}, this.value)"
                                       onchange="updateBlurZoom(${index}, this.value)"
                                       style="width: 200px; margin-right: 10px;">
                                <span id="blurZoomValue${index}" style="color: #666; font-size: 0.9rem;">100%</span>
                            </div>
                            <div style="font-size: 0.85rem; color: #888; font-style: italic; margin-bottom: 15px;">
                                Zoom: 25% = very small, 100% = original fit, 150% = zoomed in close-up
                            </div>
                            <div style="margin-bottom: 10px;">
                                <label style="color: #333; font-weight: 600; margin-right: 15px;">Background Contrast:</label>
                                <input type="range" id="contrastSlider${index}" min="0" max="100" value="50" 
                                       onchange="updateBackgroundSettings(${index})"
                                       style="width: 150px; margin-right: 10px;">
                                <span id="contrastValue${index}" style="color: #666; font-size: 0.9rem;">50%</span>
                            </div>
                            <div style="margin-bottom: 10px;">
                                <label style="color: #333; font-weight: 600; margin-right: 15px;">Background Saturation:</label>
                                <input type="range" id="saturationSlider${index}" min="0" max="100" value="50" 
                                       onchange="updateBackgroundSettings(${index})"
                                       style="width: 150px; margin-right: 10px;">
                                <span id="saturationValue${index}" style="color: #666; font-size: 0.9rem;">50%</span>
                            </div>
                            <div style="margin-bottom: 10px;">
                                <label style="color: #333; font-weight: 600; margin-right: 15px;">Background Brightness:</label>
                                <input type="range" id="brightnessSlider${index}" min="0" max="100" value="50" 
                                       onchange="updateBackgroundSettings(${index})"
                                       style="width: 150px; margin-right: 10px;">
                                <span id="brightnessValue${index}" style="color: #666; font-size: 0.9rem;">50%</span>
                            </div>
                            <div style="font-size: 0.85rem; color: #888; font-style: italic;">
                                Complete control: position, zoom, and background styling for perfect composition
                            </div>
                        </div>
                        <button class="btn btn-primary" onclick="downloadSingle(${index})">
                            Download This Image
                        </button>
                    </div>
                `;
                
                imagesGrid.appendChild(imageSection);
            });
        }

        function updateCropMethod(imageIndex, method) {
            const imageData = processedImages[imageIndex];
            imageData.currentMethod = method;
            
            // Update the displayed image
            const imageSection = imagesGrid.children[imageIndex];
            const croppedImg = imageSection.querySelector('.cropped-image');
            const alignmentControl = document.getElementById(`alignmentControl${imageIndex}`);
            const customAlignmentControl = document.getElementById(`customAlignmentControl${imageIndex}`);
            const cropPreview = document.getElementById(`cropPreview${imageIndex}`);
            const blurControls = document.getElementById(`blurControls${imageIndex}`);
            
            if (method === 'blur') {
                croppedImg.src = imageData.blur;
                alignmentControl.style.display = 'none'; // Hide alignment options for blur method
                customAlignmentControl.style.display = 'none'; // Hide custom alignment
                cropPreview.style.display = 'none'; // Hide crop preview
                blurControls.style.display = 'block'; // Show blur controls
            } else {
                croppedImg.src = imageData.cropped[imageData.currentAlignment];
                alignmentControl.style.display = 'inline'; // Show alignment options for crop method
                // Show custom alignment control if custom is selected
                if (imageData.currentAlignment === 'custom') {
                    customAlignmentControl.style.display = 'block';
                    cropPreview.style.display = 'block';
                    // Initialize preview after a short delay to ensure DOM is ready
                    setTimeout(() => initializeCropPreview(imageIndex), 100);
                } else {
                    customAlignmentControl.style.display = 'none';
                    cropPreview.style.display = 'none';
                }
                blurControls.style.display = 'none'; // Hide blur controls
            }
        }

        function updateBlurAlignment(imageIndex, alignment) {
            const imageData = processedImages[imageIndex];
            imageData.blurAlignment = alignment;
            
            const blurCustomControl = document.getElementById(`blurCustomPosition${imageIndex}`);
            
            // Show/hide custom slider based on selection
            if (alignment === 'custom') {
                blurCustomControl.style.display = 'block';
            } else {
                blurCustomControl.style.display = 'none';
            }
            
            // Update the blur image
            updateBlurImage(imageIndex);
        }

        function updateBlurCustomPosition(imageIndex, position) {
            const imageData = processedImages[imageIndex];
            imageData.blurCustomPosition = parseInt(position);
            
            // Update the position display
            document.getElementById(`blurVerticalValue${imageIndex}`).textContent = position + '%';
            
            // Update the blur image if in custom mode
            if (imageData.blurAlignment === 'custom') {
                updateBlurImage(imageIndex);
            }
        }

        function updateBlurZoom(imageIndex, zoom) {
            const imageData = processedImages[imageIndex];
            imageData.blurZoom = parseInt(zoom);
            
            // Update the zoom display
            document.getElementById(`blurZoomValue${imageIndex}`).textContent = zoom + '%';
            
            // Update the blur image with new zoom
            updateBlurImage(imageIndex);
        }

        function updateBlurImage(imageIndex) {
            const imageData = processedImages[imageIndex];
            const alignment = imageData.blurAlignment;
            const customPosition = imageData.blurCustomPosition;
            const zoom = imageData.blurZoom;
            
            // Generate new blur image with current settings
            let newBlurImage;
            if (alignment === 'custom') {
                newBlurImage = createBlurBackground(
                    imageData.originalImage,
                    imageData.backgroundContrast,
                    imageData.backgroundSaturation,
                    imageData.backgroundBrightness,
                    'custom',
                    customPosition,
                    zoom
                );
            } else {
                newBlurImage = createBlurBackground(
                    imageData.originalImage,
                    imageData.backgroundContrast,
                    imageData.backgroundSaturation,
                    imageData.backgroundBrightness,
                    alignment,
                    50, // Default position for preset alignments
                    zoom
                );
            }
            
            // Update stored blur image
            imageData.blur = newBlurImage;
            
            // Update display if currently showing blur
            if (imageData.currentMethod === 'blur') {
                const imageSection = imagesGrid.children[imageIndex];
                const croppedImg = imageSection.querySelector('.cropped-image');
                croppedImg.src = newBlurImage;
            }
        }

        function updateBackgroundSettings(imageIndex) {
            const imageData = processedImages[imageIndex];
            const contrast = parseInt(document.getElementById(`contrastSlider${imageIndex}`).value);
            const saturation = parseInt(document.getElementById(`saturationSlider${imageIndex}`).value);
            const brightness = parseInt(document.getElementById(`brightnessSlider${imageIndex}`).value);
            
            imageData.backgroundContrast = contrast;
            imageData.backgroundSaturation = saturation;
            imageData.backgroundBrightness = brightness;
            
            // Update the display values
            document.getElementById(`contrastValue${imageIndex}`).textContent = contrast + '%';
            document.getElementById(`saturationValue${imageIndex}`).textContent = saturation + '%';
            document.getElementById(`brightnessValue${imageIndex}`).textContent = brightness + '%';
            
            // Update the blur image with new settings
            updateBlurImage(imageIndex);
        }

        function updateBackgroundIntensity(imageIndex, intensity) {
            const imageData = processedImages[imageIndex];
            imageData.backgroundIntensity = parseInt(intensity);
            
            // Update the intensity display
            document.getElementById(`intensityValue${imageIndex}`).textContent = intensity + '%';
            
            // Regenerate the blur background with new intensity
            imageData.blur = createBlurBackground(imageData.originalImage, parseInt(intensity));
            
            // Update the displayed image if currently showing blur version
            if (imageData.currentMethod === 'blur') {
                const imageSection = imagesGrid.children[imageIndex];
                const croppedImg = imageSection.querySelector('.cropped-image');
                croppedImg.src = imageData.blur;
            }
        }

        function updateCropAlignment(imageIndex, alignment) {
            const imageData = processedImages[imageIndex];
            imageData.currentAlignment = alignment;
            
            const customAlignmentControl = document.getElementById(`customAlignmentControl${imageIndex}`);
            const cropPreview = document.getElementById(`cropPreview${imageIndex}`);
            
            // Show/hide custom slider based on selection
            if (alignment === 'custom') {
                customAlignmentControl.style.display = 'block';
                // Show live preview canvas
                if (imageData.currentMethod === 'crop') {
                    cropPreview.style.display = 'block';
                    initializeCropPreview(imageIndex);
                }
                // Update the custom crop with current slider value
                const customPosition = imageData.customVerticalPosition;
                imageData.cropped.custom = cropTo16x9(imageData.originalImage, 'custom', customPosition);
            } else {
                customAlignmentControl.style.display = 'none';
                cropPreview.style.display = 'none';
            }
            
            // Only update if we're in crop mode
            if (imageData.currentMethod === 'crop') {
                const imageSection = imagesGrid.children[imageIndex];
                const croppedImg = imageSection.querySelector('.cropped-image');
                croppedImg.src = imageData.cropped[alignment];
            }
        }

        function initializeCropPreview(imageIndex) {
            const imageData = processedImages[imageIndex];
            const canvas = document.getElementById(`previewCanvas${imageIndex}`);
            const ctx = canvas.getContext('2d');
            
            // Set canvas size to match the display size of the cropped image
            const croppedImg = document.querySelector(`#imagesGrid .image-section:nth-child(${imageIndex + 1}) .cropped-image`);
            canvas.width = croppedImg.offsetWidth || 400;
            canvas.height = croppedImg.offsetHeight || 225;
            
            // Draw the initial preview
            updateCustomAlignmentPreview(imageIndex, imageData.customVerticalPosition);
        }

        function updateCustomAlignmentPreview(imageIndex, position) {
            const imageData = processedImages[imageIndex];
            
            // Update the position display
            document.getElementById(`verticalValue${imageIndex}`).textContent = position + '%';
            
            // Only show preview if in custom crop mode
            if (imageData.currentMethod !== 'crop' || imageData.currentAlignment !== 'custom') {
                return;
            }
            
            const canvas = document.getElementById(`previewCanvas${imageIndex}`);
            if (!canvas) return;
            
            const ctx = canvas.getContext('2d');
            const img = imageData.originalImage;
            
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Calculate crop area (same logic as cropTo16x9 function)
            const targetRatio = 16 / 9;
            const sourceRatio = img.width / img.height;
            
            if (sourceRatio <= targetRatio) {
                // Image is taller than 16:9, so we'll be cropping vertically
                const sourceHeight = img.width / targetRatio;
                const maxOffset = img.height - sourceHeight;
                const sourceY = maxOffset * (position / 100);
                
                // Draw the preview with the calculated crop area
                const scale = Math.min(canvas.width / img.width, canvas.height / sourceHeight);
                const drawWidth = img.width * scale;
                const drawHeight = sourceHeight * scale;
                const drawX = (canvas.width - drawWidth) / 2;
                const drawY = (canvas.height - drawHeight) / 2;
                
                ctx.drawImage(
                    img,
                    0, sourceY, img.width, sourceHeight,
                    drawX, drawY, drawWidth, drawHeight
                );
            } else {
                // Image is wider than 16:9, vertical position doesn't matter
                // Just draw the normal crop
                const sourceWidth = img.height * targetRatio;
                const sourceX = (img.width - sourceWidth) / 2;
                
                const scale = Math.min(canvas.width / sourceWidth, canvas.height / img.height);
                const drawWidth = sourceWidth * scale;
                const drawHeight = img.height * scale;
                const drawX = (canvas.width - drawWidth) / 2;
                const drawY = (canvas.height - drawHeight) / 2;
                
                ctx.drawImage(
                    img,
                    sourceX, 0, sourceWidth, img.height,
                    drawX, drawY, drawWidth, drawHeight
                );
            }
        }

        function updateCustomAlignment(imageIndex, position) {
            const imageData = processedImages[imageIndex];
            imageData.customVerticalPosition = parseInt(position);
            
            // Regenerate the actual crop image for download - FORCE UPDATE
            const newCustomCrop = cropTo16x9(imageData.originalImage, 'custom', parseInt(position));
            imageData.cropped.custom = newCustomCrop;
            
            // Update the main displayed image immediately
            if (imageData.currentMethod === 'crop' && imageData.currentAlignment === 'custom') {
                const imageSection = imagesGrid.children[imageIndex];
                const croppedImg = imageSection.querySelector('.cropped-image');
                croppedImg.src = newCustomCrop; // Use the newly generated crop directly
            }
        }

        function downloadSingle(index) {
            const imageData = processedImages[index];
            let imageToDownload, filename;
            
            console.log('downloadSingle called with:', { 
                index, 
                currentMethod: imageData.currentMethod, 
                currentAlignment: imageData.currentAlignment,
                customVerticalPosition: imageData.customVerticalPosition 
            });
            
            if (imageData.currentMethod === 'blur') {
                console.log('Using blur method');
                imageToDownload = imageData.blur;
                filename = `16x9_blur_${getFileNameWithoutExtension(imageData.filename)}.png`;
            } else if (imageData.currentAlignment === 'custom') {
                console.log('Using custom alignment - about to call cropTo16x9');
                console.log('Image data:', { 
                    hasOriginalImage: !!imageData.originalImage,
                    customPosition: imageData.customVerticalPosition 
                });
                
                try {
                    // Let's inline the crop logic to debug this
                    const img = imageData.originalImage;
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    const targetRatio = 16 / 9;
                    const sourceRatio = img.width / img.height;
                    
                    console.log('Manual crop - ratios:', { targetRatio, sourceRatio });
                    
                    let sourceX = 0, sourceY = 0, sourceWidth = img.width, sourceHeight = img.height;
                    
                    if (sourceRatio > targetRatio) {
                        // Wide image - crop horizontally
                        sourceWidth = img.height * targetRatio;
                        sourceX = (img.width - sourceWidth) / 2;
                        console.log('Wide image detected - no custom positioning applies');
                    } else {
                        // Tall image - crop vertically with custom position
                        sourceHeight = img.width / targetRatio;
                        const maxOffset = img.height - sourceHeight;
                        sourceY = maxOffset * (imageData.customVerticalPosition / 100);
                        console.log('Tall image - custom crop:', { 
                            sourceHeight, 
                            maxOffset, 
                            customPosition: imageData.customVerticalPosition,
                            calculatedY: sourceY 
                        });
                    }
                    
                    // Set canvas size
                    const maxWidth = 1920;
                    if (sourceWidth > maxWidth) {
                        canvas.width = maxWidth;
                        canvas.height = maxWidth / targetRatio;
                    } else {
                        canvas.width = sourceWidth;
                        canvas.height = sourceHeight;
                    }
                    
                    console.log('Drawing with:', { sourceX, sourceY, sourceWidth, sourceHeight });
                    
                    ctx.drawImage(
                        img,
                        sourceX, sourceY, sourceWidth, sourceHeight,
                        0, 0, canvas.width, canvas.height
                    );
                    
                    const freshCustomCrop = canvas.toDataURL('image/png', 0.9);
                    console.log('Manual crop completed');
                    console.log('Generated image data URL length:', freshCustomCrop.length);
                    console.log('Generated image data URL starts with:', freshCustomCrop.substring(0, 50));
                    
                    imageToDownload = freshCustomCrop;
                    filename = `16x9_custom_${imageData.customVerticalPosition}%_${getFileNameWithoutExtension(imageData.filename)}.png`;
                    
                    console.log('Downloading custom crop with position:', imageData.customVerticalPosition);
                } catch (error) {
                    console.error('Error generating custom crop:', error);
                    // Fallback to middle crop
                    imageToDownload = imageData.cropped.middle;
                    filename = `16x9_fallback_middle_${getFileNameWithoutExtension(imageData.filename)}.png`;
                }
            } else {
                console.log('Using standard alignment:', imageData.currentAlignment);
                imageToDownload = imageData.cropped[imageData.currentAlignment];
                filename = `16x9_${imageData.currentAlignment}_${getFileNameWithoutExtension(imageData.filename)}.png`;
            }
            
            console.log('About to download:', { filename, imageToDownload: imageToDownload ? 'exists' : 'null' });
            
            // Convert data URL to blob for better download compatibility
            fetch(imageToDownload)
                .then(res => res.blob())
                .then(blob => {
                    const url = window.URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.style.display = 'none';
                    link.href = url;
                    link.download = filename;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    window.URL.revokeObjectURL(url);
                });
        }

        function downloadAll() {
            processedImages.forEach((imageData, index) => {
                setTimeout(() => {
                    let imageToDownload, filename;
                    
                    if (imageData.currentMethod === 'blur') {
                        imageToDownload = imageData.blur;
                        filename = `16x9_blur_${getFileNameWithoutExtension(imageData.filename)}.png`;
                    } else if (imageData.currentAlignment === 'custom') {
                        // ALWAYS regenerate custom crop at download time
                        const freshCustomCrop = cropTo16x9(imageData.originalImage, 'custom', imageData.customVerticalPosition);
                        imageToDownload = freshCustomCrop;
                        filename = `16x9_custom_${imageData.customVerticalPosition}%_${getFileNameWithoutExtension(imageData.filename)}.png`;
                    } else {
                        imageToDownload = imageData.cropped[imageData.currentAlignment];
                        filename = `16x9_${imageData.currentAlignment}_${getFileNameWithoutExtension(imageData.filename)}.png`;
                    }
                    
                    fetch(imageToDownload)
                        .then(res => res.blob())
                        .then(blob => {
                            const url = window.URL.createObjectURL(blob);
                            const link = document.createElement('a');
                            link.style.display = 'none';
                            link.href = url;
                            link.download = filename;
                            document.body.appendChild(link);
                            link.click();
                            document.body.removeChild(link);
                            window.URL.revokeObjectURL(url);
                        });
                }, index * 200);
            });
        }

        function getFileNameWithoutExtension(filename) {
            return filename.substring(0, filename.lastIndexOf('.')) || filename;
        }

        function clearImages() {
            processedImages = [];
            imageContainer.style.display = 'none';
            fileInput.value = '';
        }
    </script>
</body>

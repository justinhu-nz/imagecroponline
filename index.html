<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>16:9 Image Cropper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 1rem;
            opacity: 0.9;
        }

        .content {
            padding: 20px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 12px;
            padding: 25px 20px;
            text-align: center;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05), rgba(118, 75, 162, 0.05));
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            transform: translateY(-2px);
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15), rgba(118, 75, 162, 0.15));
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 15px;
        }

        .upload-text {
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .upload-subtext {
            color: #666;
            font-size: 0.9rem;
        }

        #fileInput {
            display: none;
        }

        .image-container {
            display: none;
            margin-top: 20px;
        }

        .image-preview {
            text-align: center;
            margin-bottom: 20px;
        }

        .original-image, .cropped-image {
            max-width: 100%;
            max-height: 400px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin: 10px;
        }

        .image-section {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 10px;
            margin: 12px 0;
        }

        .image-section h3 {
            color: #333;
            margin-bottom: 8px;
            font-size: 1rem;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .btn {
            padding: 6px 16px;
            border: none;
            border-radius: 16px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #333;
            border: 2px solid #dee2e6;
        }

        .btn-secondary:hover {
            background: #e9ecef;
            transform: translateY(-2px);
        }

        .processing {
            text-align: center;
            padding: 40px;
            color: #667eea;
            font-size: 1.2rem;
        }

        .status-message {
            display: none;
            margin-bottom: 15px;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 0.95rem;
            line-height: 1.4;
            white-space: pre-line;
        }

        .status-message.error {
            display: block;
            background: #fff1f0;
            border: 1px solid #ffccc7;
            color: #b42318;
        }

        .status-message.info {
            display: block;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            color: #1d4ed8;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .image-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 15px;
        }

        @media (max-width: 768px) {
            .image-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📐 16:9 Image Cropper</h1>
            <p>Justin's 16:9 image crop tool</p>
        </div>
        
        <div class="content">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <div class="upload-text">Drop your images or a ZIP archive here, or click to browse</div>
                <div class="upload-subtext">Supports JPG, PNG, GIF, WebP, and ZIP archives that contain images</div>
                <input type="file" id="fileInput" accept="image/*,.zip,application/zip,application/x-zip-compressed" multiple>
            </div>

            <div id="statusMessage" class="status-message"></div>
            
            <div id="processing" class="processing" style="display: none;">
                <div class="spinner"></div>
                <div id="processingText">Processing images...</div>
            </div>
            
            <div id="imageContainer" class="image-container">
                <div class="controls" style="margin-bottom: 15px;">
                    <button class="btn btn-secondary" onclick="clearImages()">Clear All</button>
                    <button class="btn btn-primary" onclick="downloadAll()">Download All</button>
                </div>
                <div id="imagesGrid"></div>
            </div>
        </div>
    </div>

    <script src="fflate.min.js"></script>
    <script>
        const TARGET_WIDTH = 1920;
        const TARGET_HEIGHT = 1080;
        const TARGET_RATIO = TARGET_WIDTH / TARGET_HEIGHT;
        const DEFAULT_ALIGNMENT = 'middle';
        const DEFAULT_VERTICAL_POSITION = 50;
        const DEFAULT_BLUR_ZOOM = 100;
        const DEFAULT_BACKGROUND_VALUE = 50;

        let processedImages = [];
        let isProcessing = false;

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const imageContainer = document.getElementById('imageContainer');
        const imagesGrid = document.getElementById('imagesGrid');
        const processing = document.getElementById('processing');
        const processingText = document.getElementById('processingText');
        const statusMessage = document.getElementById('statusMessage');

        function isZipFile(file) {
            const lowerName = file.name.toLowerCase();
            return lowerName.endsWith('.zip') || file.type === 'application/zip' || file.type === 'application/x-zip-compressed';
        }

        function inferImageMimeType(filename) {
            const lowerName = filename.toLowerCase();

            if (lowerName.endsWith('.jpg') || lowerName.endsWith('.jpeg')) {
                return 'image/jpeg';
            }

            if (lowerName.endsWith('.png')) {
                return 'image/png';
            }

            if (lowerName.endsWith('.gif')) {
                return 'image/gif';
            }

            if (lowerName.endsWith('.webp')) {
                return 'image/webp';
            }

            return '';
        }

        function isSupportedImageFile(file) {
            return file.type.startsWith('image/') || Boolean(inferImageMimeType(file.name));
        }

        function isSupportedInputFile(file) {
            return isSupportedImageFile(file) || isZipFile(file);
        }

        uploadArea.addEventListener('click', () => {
            if (!isProcessing) {
                fileInput.click();
            }
        });
        uploadArea.addEventListener('dragover', handleDragOver);
        uploadArea.addEventListener('dragleave', handleDragLeave);
        uploadArea.addEventListener('drop', handleDrop);
        fileInput.addEventListener('change', handleFileSelect);

        function handleDragOver(e) {
            e.preventDefault();
            if (!isProcessing) {
                uploadArea.classList.add('dragover');
            }
        }

        function handleDragLeave(e) {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
        }

        function handleDrop(e) {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (isProcessing) {
                return;
            }

            const files = Array.from(e.dataTransfer.files).filter(isSupportedInputFile);
            if (files.length > 0) {
                processFiles(files);
            } else {
                showStatus('Drop one or more JPG, PNG, GIF, WebP images, or a ZIP archive that contains images to get started.', 'error');
            }
        }

        function handleFileSelect(e) {
            if (isProcessing) {
                fileInput.value = '';
                return;
            }

            const files = Array.from(e.target.files).filter(isSupportedInputFile);
            fileInput.value = '';

            if (files.length > 0) {
                processFiles(files);
            } else {
                showStatus('Please choose at least one supported image file or ZIP archive.', 'error');
            }
        }

        async function processFiles(files) {
            if (!files.length) {
                return;
            }

            const failures = [];
            const notices = [];
            isProcessing = true;
            setProcessingState(true, `Processing 1 of ${files.length}...`);
            hideStatus();

            try {
                const expandedInputs = [];

                for (let index = 0; index < files.length; index += 1) {
                    const file = files[index];

                    if (isZipFile(file)) {
                        setProcessingState(true, `Extracting ZIP ${index + 1} of ${files.length}: ${file.name}`);
                        await nextFrame();

                        try {
                            const extraction = await extractSupportedFilesFromZip(file);

                            if (!extraction.files.length) {
                                notices.push(`${file.name}: no supported images were found in the archive.`);
                            } else {
                                expandedInputs.push(...extraction.files);

                                if (extraction.skippedEntries.length) {
                                    notices.push(`${file.name}: imported ${extraction.files.length} image(s) and skipped ${extraction.skippedEntries.length} non-image file(s).`);
                                }
                            }
                        } catch (error) {
                            failures.push(`${file.name}: ${error.message}`);
                        }

                        continue;
                    }

                    expandedInputs.push({
                        file,
                        displayName: file.name
                    });
                }

                for (let index = 0; index < expandedInputs.length; index += 1) {
                    const input = expandedInputs[index];
                    setProcessingState(true, `Processing ${index + 1} of ${expandedInputs.length}: ${input.displayName}`);
                    await nextFrame();

                    try {
                        processedImages.push(await processImage(input.file, input.displayName));
                    } catch (error) {
                        failures.push(`${input.displayName}: ${error.message}`);
                    }
                }

                displayImages();

                if (!processedImages.length) {
                    imageContainer.style.display = 'none';
                } else {
                    imageContainer.style.display = 'block';
                }

                if (failures.length > 0) {
                    showStatus(`Some files could not be processed:\n${failures.join('\n')}`, 'error');
                } else if (notices.length > 0) {
                    showStatus(notices.join('\n'), 'info');
                } else {
                    hideStatus();
                }
            } finally {
                isProcessing = false;
                setProcessingState(false);
            }
        }

        function unzipArchive(zipData) {
            return new Promise((resolve, reject) => {
                if (!window.fflate || typeof window.fflate.unzipSync !== 'function') {
                    reject(new Error('ZIP support is unavailable because the unzip library did not load'));
                    return;
                }

                try {
                    resolve(window.fflate.unzipSync(zipData));
                } catch (error) {
                    reject(error);
                }
            });
        }

        async function extractSupportedFilesFromZip(zipFile) {
            const zipData = new Uint8Array(await zipFile.arrayBuffer());
            const extractedEntries = await unzipArchive(zipData);
            const files = [];
            const skippedEntries = [];

            Object.entries(extractedEntries).forEach(([entryName, entryData]) => {
                if (entryName.endsWith('/') || entryName.startsWith('__MACOSX/')) {
                    return;
                }

                const mimeType = inferImageMimeType(entryName);

                if (!mimeType) {
                    skippedEntries.push(entryName);
                    return;
                }

                const blob = new Blob([entryData], { type: mimeType });
                const shortName = entryName.split('/').pop() || entryName;

                files.push({
                    file: new File([blob], shortName, { type: mimeType }),
                    displayName: `${zipFile.name} / ${entryName}`
                });
            });

            return {
                files,
                skippedEntries
            };
        }

        function processImage(file, displayName = file.name) {
            return new Promise((resolve, reject) => {
                const objectUrl = URL.createObjectURL(file);
                const img = new Image();

                img.onload = function() {
                    resolve({
                        original: objectUrl,
                        originalImage: img,
                        filename: displayName,
                        currentAlignment: DEFAULT_ALIGNMENT,
                        customVerticalPosition: DEFAULT_VERTICAL_POSITION,
                        currentMethod: 'crop',
                        blurAlignment: DEFAULT_ALIGNMENT,
                        blurCustomPosition: DEFAULT_VERTICAL_POSITION,
                        blurZoom: DEFAULT_BLUR_ZOOM,
                        backgroundContrast: DEFAULT_BACKGROUND_VALUE,
                        backgroundSaturation: DEFAULT_BACKGROUND_VALUE,
                        backgroundBrightness: DEFAULT_BACKGROUND_VALUE,
                        cropCache: {},
                        blurCacheKey: '',
                        blur: null
                    });
                };

                img.onerror = function() {
                    URL.revokeObjectURL(objectUrl);
                    reject(new Error('the image could not be decoded'));
                };

                img.src = objectUrl;
            });
        }

        function setProcessingState(active, message = 'Processing images...') {
            processing.style.display = active ? 'block' : 'none';
            uploadArea.style.pointerEvents = active ? 'none' : '';
            uploadArea.style.opacity = active ? '0.7' : '';
            processingText.textContent = message;
        }

        function showStatus(message, type = 'info') {
            statusMessage.textContent = message;
            statusMessage.className = `status-message ${type}`;
        }

        function hideStatus() {
            statusMessage.textContent = '';
            statusMessage.className = 'status-message';
        }

        function nextFrame() {
            return new Promise(resolve => requestAnimationFrame(resolve));
        }

        function clampNumber(value, min, max, fallback) {
            const numericValue = Number(value);

            if (!Number.isFinite(numericValue)) {
                return fallback;
            }

            return Math.min(max, Math.max(min, numericValue));
        }

        function getCropImage(imageData, alignment = imageData.currentAlignment, customPosition = imageData.customVerticalPosition) {
            const normalizedAlignment = alignment === 'custom' ? 'custom' : ['top', 'middle', 'bottom'].includes(alignment) ? alignment : DEFAULT_ALIGNMENT;
            const safeCustomPosition = clampNumber(customPosition, 0, 100, DEFAULT_VERTICAL_POSITION);
            const cacheKey = normalizedAlignment === 'custom' ? `custom:${safeCustomPosition}` : normalizedAlignment;

            if (!imageData.cropCache[cacheKey]) {
                imageData.cropCache[cacheKey] = cropTo16x9(imageData.originalImage, normalizedAlignment, safeCustomPosition);
            }

            return imageData.cropCache[cacheKey];
        }

        function getBlurImage(imageData) {
            const alignment = imageData.blurAlignment === 'custom' ? 'custom' : ['top', 'middle', 'bottom'].includes(imageData.blurAlignment) ? imageData.blurAlignment : DEFAULT_ALIGNMENT;
            const customPosition = clampNumber(imageData.blurCustomPosition, 0, 100, DEFAULT_VERTICAL_POSITION);
            const zoom = clampNumber(imageData.blurZoom, 25, 150, DEFAULT_BLUR_ZOOM);
            const contrast = clampNumber(imageData.backgroundContrast, 0, 100, DEFAULT_BACKGROUND_VALUE);
            const saturation = clampNumber(imageData.backgroundSaturation, 0, 100, DEFAULT_BACKGROUND_VALUE);
            const brightness = clampNumber(imageData.backgroundBrightness, 0, 100, DEFAULT_BACKGROUND_VALUE);
            const cacheKey = [alignment, customPosition, zoom, contrast, saturation, brightness].join(':');

            if (imageData.blurCacheKey !== cacheKey) {
                imageData.blur = createBlurBackground(
                    imageData.originalImage,
                    contrast,
                    saturation,
                    brightness,
                    alignment,
                    customPosition,
                    zoom
                );
                imageData.blurCacheKey = cacheKey;
            }

            return imageData.blur;
        }

        function getCurrentImageOutput(imageData) {
            if (imageData.currentMethod === 'blur') {
                return getBlurImage(imageData);
            }

            return getCropImage(imageData, imageData.currentAlignment, imageData.customVerticalPosition);
        }

        function createBlurBackground(img, contrast = DEFAULT_BACKGROUND_VALUE, saturation = DEFAULT_BACKGROUND_VALUE, brightness = DEFAULT_BACKGROUND_VALUE, alignment = DEFAULT_ALIGNMENT, customPosition = DEFAULT_VERTICAL_POSITION, zoom = DEFAULT_BLUR_ZOOM) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            canvas.width = TARGET_WIDTH;
            canvas.height = TARGET_HEIGHT;

            const blurPadding = 160;
            const imageRatio = img.width / img.height;
            let bgWidth;
            let bgHeight;
            let bgX;
            let bgY;

            if (imageRatio > TARGET_RATIO) {
                bgHeight = canvas.height + (blurPadding * 2);
                bgWidth = bgHeight * imageRatio;
                bgX = (canvas.width - bgWidth) / 2;
                bgY = -blurPadding;
            } else {
                bgWidth = canvas.width + (blurPadding * 2);
                bgHeight = bgWidth / imageRatio;
                bgX = -blurPadding;
                bgY = (canvas.height - bgHeight) / 2;
            }

            const contrastValue = 50 + (contrast * 0.5);
            const saturationValue = saturation;
            const brightnessValue = 50 + (brightness * 0.5);

            ctx.filter = `blur(80px) contrast(${contrastValue}%) saturate(${saturationValue}%) brightness(${brightnessValue}%)`;
            ctx.drawImage(img, bgX, bgY, bgWidth, bgHeight);
            ctx.filter = 'none';

            let baseOverlayWidth;
            let baseOverlayHeight;

            if (imageRatio > TARGET_RATIO) {
                baseOverlayWidth = canvas.width;
                baseOverlayHeight = canvas.width / imageRatio;
            } else {
                baseOverlayHeight = canvas.height;
                baseOverlayWidth = canvas.height * imageRatio;
            }

            const zoomFactor = clampNumber(zoom, 25, 150, DEFAULT_BLUR_ZOOM) / 100;
            const overlayWidth = baseOverlayWidth * zoomFactor;
            const overlayHeight = baseOverlayHeight * zoomFactor;
            const overlayX = (canvas.width - overlayWidth) / 2;
            const maxYOffset = canvas.height - overlayHeight;
            const safeAlignment = alignment === 'custom' ? 'custom' : ['top', 'middle', 'bottom'].includes(alignment) ? alignment : DEFAULT_ALIGNMENT;
            let overlayY;

            switch (safeAlignment) {
                case 'top':
                    overlayY = 0;
                    break;
                case 'bottom':
                    overlayY = maxYOffset;
                    break;
                case 'custom':
                    overlayY = maxYOffset * (clampNumber(customPosition, 0, 100, DEFAULT_VERTICAL_POSITION) / 100);
                    break;
                case 'middle':
                default:
                    overlayY = maxYOffset / 2;
                    break;
            }

            ctx.shadowColor = 'rgba(0, 0, 0, 0.25)';
            ctx.shadowBlur = 40;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 8;
            ctx.drawImage(img, overlayX, overlayY, overlayWidth, overlayHeight);
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;

            return canvas.toDataURL('image/png', 0.9);
        }

        function cropTo16x9(img, alignment = DEFAULT_ALIGNMENT, customPosition = DEFAULT_VERTICAL_POSITION) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            const sourceRatio = img.width / img.height;
            let sourceX = 0;
            let sourceY = 0;
            let sourceWidth = img.width;
            let sourceHeight = img.height;

            if (sourceRatio > TARGET_RATIO) {
                sourceWidth = img.height * TARGET_RATIO;
                sourceX = (img.width - sourceWidth) / 2;
            } else {
                sourceHeight = img.width / TARGET_RATIO;
                const maxOffset = img.height - sourceHeight;

                switch (alignment) {
                    case 'top':
                        sourceY = 0;
                        break;
                    case 'bottom':
                        sourceY = maxOffset;
                        break;
                    case 'custom':
                        sourceY = maxOffset * (clampNumber(customPosition, 0, 100, DEFAULT_VERTICAL_POSITION) / 100);
                        break;
                    case 'middle':
                    default:
                        sourceY = maxOffset / 2;
                        break;
                }
            }

            if (sourceWidth > TARGET_WIDTH) {
                canvas.width = TARGET_WIDTH;
                canvas.height = TARGET_HEIGHT;
            } else {
                canvas.width = Math.round(sourceWidth);
                canvas.height = Math.round(sourceHeight);
            }

            ctx.drawImage(
                img,
                sourceX,
                sourceY,
                sourceWidth,
                sourceHeight,
                0,
                0,
                canvas.width,
                canvas.height
            );

            return canvas.toDataURL('image/png', 0.9);
        }

        function displayImages() {
            imagesGrid.innerHTML = '';

            processedImages.forEach((imageData, index) => {
                const imageSection = document.createElement('div');
                imageSection.className = 'image-section';

                const showCropControls = imageData.currentMethod === 'crop';
                const showCustomCropControls = showCropControls && imageData.currentAlignment === 'custom';
                const showBlurControls = imageData.currentMethod === 'blur';
                const showBlurCustomControls = showBlurControls && imageData.blurAlignment === 'custom';

                imageSection.innerHTML = `
                    <h3>Image ${index + 1}: ${imageData.filename}</h3>
                    <div class="image-grid">
                        <div>
                            <h4 style="text-align: center; margin-bottom: 10px; color: #666;">Original</h4>
                            <img src="${imageData.original}" alt="Original" class="original-image">
                        </div>
                        <div>
                            <h4 style="text-align: center; margin-bottom: 10px; color: #667eea;">16:9 Output</h4>
                            <div style="position: relative; display: inline-block;">
                                <img src="${getCurrentImageOutput(imageData)}" alt="Processed output" class="cropped-image">
                                <div id="cropPreview${index}" style="display: ${showCustomCropControls ? 'block' : 'none'}; position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none;">
                                    <canvas id="previewCanvas${index}" style="width: 100%; height: 100%; object-fit: contain;"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div style="text-align: center; margin-top: 15px;">
                        <div style="margin-bottom: 15px;">
                            <label style="color: #333; font-weight: 600; margin-right: 15px;">Crop Method:</label>
                            <select onchange="updateCropMethod(${index}, this.value)" style="padding: 4px 8px; border-radius: 4px; border: 2px solid #dee2e6; font-size: 0.85rem; margin-right: 10px;">
                                <option value="crop" ${imageData.currentMethod === 'crop' ? 'selected' : ''}>Crop to Fit</option>
                                <option value="blur" ${imageData.currentMethod === 'blur' ? 'selected' : ''}>Blur Background</option>
                            </select>
                            <span id="alignmentControl${index}" style="display: ${showCropControls ? 'inline' : 'none'};">
                                <label style="color: #333; font-weight: 600; margin-right: 15px;">Vertical Alignment:</label>
                                <select onchange="updateCropAlignment(${index}, this.value)" style="padding: 4px 8px; border-radius: 4px; border: 2px solid #dee2e6; font-size: 0.85rem;">
                                    <option value="top" ${imageData.currentAlignment === 'top' ? 'selected' : ''}>Top</option>
                                    <option value="middle" ${imageData.currentAlignment === 'middle' ? 'selected' : ''}>Middle</option>
                                    <option value="bottom" ${imageData.currentAlignment === 'bottom' ? 'selected' : ''}>Bottom</option>
                                    <option value="custom" ${imageData.currentAlignment === 'custom' ? 'selected' : ''}>Custom</option>
                                </select>
                            </span>
                        </div>
                        <div id="customAlignmentControl${index}" style="margin-bottom: 15px; display: ${showCustomCropControls ? 'block' : 'none'};">
                            <div style="margin-bottom: 10px;">
                                <label style="color: #333; font-weight: 600; margin-right: 15px;">Vertical Position:</label>
                                <input type="range" id="verticalSlider${index}" min="0" max="100" value="${imageData.customVerticalPosition}" 
                                       oninput="updateCustomAlignmentPreview(${index}, this.value)"
                                       onchange="updateCustomAlignment(${index}, this.value)"
                                       style="width: 200px; margin-right: 10px;">
                                <span id="verticalValue${index}" style="color: #666; font-size: 0.9rem;">${imageData.customVerticalPosition}%</span>
                            </div>
                            <div style="font-size: 0.85rem; color: #888; font-style: italic;">
                                0% = top of image, 50% = center, 100% = bottom of image
                            </div>
                        </div>
                        <div id="blurControls${index}" style="margin-bottom: 15px; display: ${showBlurControls ? 'block' : 'none'};">
                            <div style="margin-bottom: 10px;">
                                <label style="color: #333; font-weight: 600; margin-right: 15px;">Foreground Position:</label>
                                <select id="blurAlignmentSelect${index}" onchange="updateBlurAlignment(${index}, this.value)" style="padding: 4px 8px; border-radius: 4px; border: 2px solid #dee2e6; font-size: 0.85rem; margin-right: 10px;">
                                    <option value="top" ${imageData.blurAlignment === 'top' ? 'selected' : ''}>Top</option>
                                    <option value="middle" ${imageData.blurAlignment === 'middle' ? 'selected' : ''}>Middle</option>
                                    <option value="bottom" ${imageData.blurAlignment === 'bottom' ? 'selected' : ''}>Bottom</option>
                                    <option value="custom" ${imageData.blurAlignment === 'custom' ? 'selected' : ''}>Custom</option>
                                </select>
                            </div>
                            <div id="blurCustomPosition${index}" style="margin-bottom: 15px; display: ${showBlurCustomControls ? 'block' : 'none'};">
                                <label style="color: #333; font-weight: 600; margin-right: 15px;">Vertical Position:</label>
                                <input type="range" id="blurVerticalSlider${index}" min="0" max="100" value="${imageData.blurCustomPosition}" 
                                       oninput="updateBlurCustomPosition(${index}, this.value)"
                                       onchange="updateBlurCustomPosition(${index}, this.value)"
                                       style="width: 200px; margin-right: 10px;">
                                <span id="blurVerticalValue${index}" style="color: #666; font-size: 0.9rem;">${imageData.blurCustomPosition}%</span>
                            </div>
                            <div style="margin-bottom: 15px;">
                                <label style="color: #333; font-weight: 600; margin-right: 15px;">Foreground Zoom:</label>
                                <input type="range" id="blurZoomSlider${index}" min="25" max="150" value="${imageData.blurZoom}" 
                                       oninput="updateBlurZoom(${index}, this.value)"
                                       onchange="updateBlurZoom(${index}, this.value)"
                                       style="width: 200px; margin-right: 10px;">
                                <span id="blurZoomValue${index}" style="color: #666; font-size: 0.9rem;">${imageData.blurZoom}%</span>
                            </div>
                            <div style="font-size: 0.85rem; color: #888; font-style: italic; margin-bottom: 15px;">
                                Zoom: 25% = very small, 100% = original fit, 150% = zoomed in close-up
                            </div>
                            <div style="margin-bottom: 10px;">
                                <label style="color: #333; font-weight: 600; margin-right: 15px;">Background Contrast:</label>
                                <input type="range" id="contrastSlider${index}" min="0" max="100" value="${imageData.backgroundContrast}" 
                                       onchange="updateBackgroundSettings(${index})"
                                       style="width: 150px; margin-right: 10px;">
                                <span id="contrastValue${index}" style="color: #666; font-size: 0.9rem;">${imageData.backgroundContrast}%</span>
                            </div>
                            <div style="margin-bottom: 10px;">
                                <label style="color: #333; font-weight: 600; margin-right: 15px;">Background Saturation:</label>
                                <input type="range" id="saturationSlider${index}" min="0" max="100" value="${imageData.backgroundSaturation}" 
                                       onchange="updateBackgroundSettings(${index})"
                                       style="width: 150px; margin-right: 10px;">
                                <span id="saturationValue${index}" style="color: #666; font-size: 0.9rem;">${imageData.backgroundSaturation}%</span>
                            </div>
                            <div style="margin-bottom: 10px;">
                                <label style="color: #333; font-weight: 600; margin-right: 15px;">Background Brightness:</label>
                                <input type="range" id="brightnessSlider${index}" min="0" max="100" value="${imageData.backgroundBrightness}" 
                                       onchange="updateBackgroundSettings(${index})"
                                       style="width: 150px; margin-right: 10px;">
                                <span id="brightnessValue${index}" style="color: #666; font-size: 0.9rem;">${imageData.backgroundBrightness}%</span>
                            </div>
                            <div style="font-size: 0.85rem; color: #888; font-style: italic;">
                                Complete control: position, zoom, and background styling for perfect composition
                            </div>
                        </div>
                        <button class="btn btn-primary" onclick="downloadSingle(${index})">
                            Download This Image
                        </button>
                    </div>
                `;

                imagesGrid.appendChild(imageSection);
            });

            requestAnimationFrame(() => {
                processedImages.forEach((imageData, index) => {
                    if (imageData.currentMethod === 'crop' && imageData.currentAlignment === 'custom') {
                        initializeCropPreview(index);
                    }
                });
            });
        }

        function refreshOutput(imageIndex, options = {}) {
            const imageData = processedImages[imageIndex];
            const imageSection = imagesGrid.children[imageIndex];

            if (!imageData || !imageSection) {
                return;
            }

            const croppedImg = imageSection.querySelector('.cropped-image');
            const alignmentControl = document.getElementById(`alignmentControl${imageIndex}`);
            const customAlignmentControl = document.getElementById(`customAlignmentControl${imageIndex}`);
            const cropPreview = document.getElementById(`cropPreview${imageIndex}`);
            const blurControls = document.getElementById(`blurControls${imageIndex}`);
            const blurCustomControl = document.getElementById(`blurCustomPosition${imageIndex}`);

            croppedImg.src = getCurrentImageOutput(imageData);
            alignmentControl.style.display = imageData.currentMethod === 'crop' ? 'inline' : 'none';
            customAlignmentControl.style.display = imageData.currentMethod === 'crop' && imageData.currentAlignment === 'custom' ? 'block' : 'none';
            cropPreview.style.display = imageData.currentMethod === 'crop' && imageData.currentAlignment === 'custom' ? 'block' : 'none';
            blurControls.style.display = imageData.currentMethod === 'blur' ? 'block' : 'none';
            blurCustomControl.style.display = imageData.currentMethod === 'blur' && imageData.blurAlignment === 'custom' ? 'block' : 'none';

            if (imageData.currentMethod === 'crop' && imageData.currentAlignment === 'custom' && options.skipPreview !== true) {
                requestAnimationFrame(() => initializeCropPreview(imageIndex));
            }
        }

        function updateCropMethod(imageIndex, method) {
            const imageData = processedImages[imageIndex];
            imageData.currentMethod = method === 'blur' ? 'blur' : 'crop';
            refreshOutput(imageIndex);
        }

        function updateCropAlignment(imageIndex, alignment) {
            const imageData = processedImages[imageIndex];
            imageData.currentAlignment = alignment === 'custom' ? 'custom' : ['top', 'middle', 'bottom'].includes(alignment) ? alignment : DEFAULT_ALIGNMENT;
            refreshOutput(imageIndex);
        }

        function updateCustomAlignmentPreview(imageIndex, position) {
            const imageData = processedImages[imageIndex];
            const safePosition = clampNumber(position, 0, 100, DEFAULT_VERTICAL_POSITION);
            document.getElementById(`verticalValue${imageIndex}`).textContent = `${safePosition}%`;

            if (imageData.currentMethod !== 'crop' || imageData.currentAlignment !== 'custom') {
                return;
            }

            const canvas = document.getElementById(`previewCanvas${imageIndex}`);
            if (!canvas) {
                return;
            }

            const ctx = canvas.getContext('2d');
            const img = imageData.originalImage;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const sourceRatio = img.width / img.height;

            if (sourceRatio <= TARGET_RATIO) {
                const sourceHeight = img.width / TARGET_RATIO;
                const maxOffset = img.height - sourceHeight;
                const sourceY = maxOffset * (safePosition / 100);
                const scale = Math.min(canvas.width / img.width, canvas.height / sourceHeight);
                const drawWidth = img.width * scale;
                const drawHeight = sourceHeight * scale;
                const drawX = (canvas.width - drawWidth) / 2;
                const drawY = (canvas.height - drawHeight) / 2;

                ctx.drawImage(
                    img,
                    0,
                    sourceY,
                    img.width,
                    sourceHeight,
                    drawX,
                    drawY,
                    drawWidth,
                    drawHeight
                );
            } else {
                const sourceWidth = img.height * TARGET_RATIO;
                const sourceX = (img.width - sourceWidth) / 2;
                const scale = Math.min(canvas.width / sourceWidth, canvas.height / img.height);
                const drawWidth = sourceWidth * scale;
                const drawHeight = img.height * scale;
                const drawX = (canvas.width - drawWidth) / 2;
                const drawY = (canvas.height - drawHeight) / 2;

                ctx.drawImage(
                    img,
                    sourceX,
                    0,
                    sourceWidth,
                    img.height,
                    drawX,
                    drawY,
                    drawWidth,
                    drawHeight
                );
            }
        }

        function initializeCropPreview(imageIndex) {
            const imageData = processedImages[imageIndex];
            const canvas = document.getElementById(`previewCanvas${imageIndex}`);

            if (!canvas || !imageData) {
                return;
            }

            const croppedImg = imagesGrid.children[imageIndex]?.querySelector('.cropped-image');
            canvas.width = croppedImg?.offsetWidth || 400;
            canvas.height = croppedImg?.offsetHeight || 225;
            updateCustomAlignmentPreview(imageIndex, imageData.customVerticalPosition);
        }

        function updateCustomAlignment(imageIndex, position) {
            const imageData = processedImages[imageIndex];
            imageData.customVerticalPosition = clampNumber(position, 0, 100, DEFAULT_VERTICAL_POSITION);
            document.getElementById(`verticalSlider${imageIndex}`).value = imageData.customVerticalPosition;
            document.getElementById(`verticalValue${imageIndex}`).textContent = `${imageData.customVerticalPosition}%`;
            refreshOutput(imageIndex, { skipPreview: true });
            updateCustomAlignmentPreview(imageIndex, imageData.customVerticalPosition);
        }

        function updateBlurAlignment(imageIndex, alignment) {
            const imageData = processedImages[imageIndex];
            imageData.blurAlignment = alignment === 'custom' ? 'custom' : ['top', 'middle', 'bottom'].includes(alignment) ? alignment : DEFAULT_ALIGNMENT;
            refreshOutput(imageIndex, { skipPreview: true });
        }

        function updateBlurCustomPosition(imageIndex, position) {
            const imageData = processedImages[imageIndex];
            imageData.blurCustomPosition = clampNumber(position, 0, 100, DEFAULT_VERTICAL_POSITION);
            document.getElementById(`blurVerticalSlider${imageIndex}`).value = imageData.blurCustomPosition;
            document.getElementById(`blurVerticalValue${imageIndex}`).textContent = `${imageData.blurCustomPosition}%`;

            if (imageData.blurAlignment === 'custom') {
                refreshOutput(imageIndex, { skipPreview: true });
            }
        }

        function updateBlurZoom(imageIndex, zoom) {
            const imageData = processedImages[imageIndex];
            imageData.blurZoom = clampNumber(zoom, 25, 150, DEFAULT_BLUR_ZOOM);
            document.getElementById(`blurZoomSlider${imageIndex}`).value = imageData.blurZoom;
            document.getElementById(`blurZoomValue${imageIndex}`).textContent = `${imageData.blurZoom}%`;
            refreshOutput(imageIndex, { skipPreview: true });
        }

        function updateBackgroundSettings(imageIndex) {
            const imageData = processedImages[imageIndex];
            imageData.backgroundContrast = clampNumber(document.getElementById(`contrastSlider${imageIndex}`).value, 0, 100, DEFAULT_BACKGROUND_VALUE);
            imageData.backgroundSaturation = clampNumber(document.getElementById(`saturationSlider${imageIndex}`).value, 0, 100, DEFAULT_BACKGROUND_VALUE);
            imageData.backgroundBrightness = clampNumber(document.getElementById(`brightnessSlider${imageIndex}`).value, 0, 100, DEFAULT_BACKGROUND_VALUE);

            document.getElementById(`contrastValue${imageIndex}`).textContent = `${imageData.backgroundContrast}%`;
            document.getElementById(`saturationValue${imageIndex}`).textContent = `${imageData.backgroundSaturation}%`;
            document.getElementById(`brightnessValue${imageIndex}`).textContent = `${imageData.backgroundBrightness}%`;
            refreshOutput(imageIndex, { skipPreview: true });
        }

        async function downloadDataUrl(dataUrl, filename) {
            const response = await fetch(dataUrl);
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const link = document.createElement('a');

            link.style.display = 'none';
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            window.URL.revokeObjectURL(url);
        }

        function buildDownloadFilename(imageData) {
            const baseName = sanitizeDownloadName(getFileNameWithoutExtension(imageData.filename));

            if (imageData.currentMethod === 'blur') {
                return `16x9_blur_${baseName}.png`;
            }

            if (imageData.currentAlignment === 'custom') {
                return `16x9_custom_${imageData.customVerticalPosition}%_${baseName}.png`;
            }

            return `16x9_${imageData.currentAlignment}_${baseName}.png`;
        }

        async function downloadSingle(index) {
            const imageData = processedImages[index];

            if (!imageData) {
                return;
            }

            try {
                await downloadDataUrl(getCurrentImageOutput(imageData), buildDownloadFilename(imageData));
            } catch (error) {
                showStatus(`Download failed for ${imageData.filename}. Please try again.`, 'error');
            }
        }

        function downloadAll() {
            processedImages.forEach((imageData, index) => {
                setTimeout(() => {
                    downloadDataUrl(getCurrentImageOutput(imageData), buildDownloadFilename(imageData))
                        .catch(() => {
                            showStatus(`At least one download failed. Please retry the affected image.`, 'error');
                        });
                }, index * 200);
            });
        }

        function getFileNameWithoutExtension(filename) {
            return filename.substring(0, filename.lastIndexOf('.')) || filename;
        }

        function sanitizeDownloadName(filename) {
            return filename
                .replace(/[\\/:*?"<>|]+/g, '_')
                .replace(/\s+/g, '_')
                .replace(/_+/g, '_')
                .replace(/^_+|_+$/g, '');
        }

        function clearImages() {
            processedImages.forEach(imageData => {
                if (imageData.original) {
                    URL.revokeObjectURL(imageData.original);
                }
            });

            processedImages = [];
            imagesGrid.innerHTML = '';
            imageContainer.style.display = 'none';
            fileInput.value = '';
            hideStatus();
        }

        window.imageCropperDebug = {
            cropTo16x9,
            createBlurBackground,
            buildDownloadFilename,
            getCropImage,
            getBlurImage,
            extractSupportedFilesFromZip
        };
    </script>
</body>
</html>
